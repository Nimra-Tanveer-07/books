<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <title>Books</title>
    <style>
    /* Hide scrollbar for Chrome, Safari, Edge */
    ::-webkit-scrollbar {
        display: none;
    }

    /* Hide scrollbar for Firefox */
    html {
        scrollbar-width: none;
    }

    /* Prevent layout shift */
    body {
        -ms-overflow-style: none;
    }
</style>
</head>


<body class="min-h-screen">

    <!-- Background -->
    <div class="fixed inset-0 -z-10">
        <img src="book.png" class="w-full h-full object-cover">
    </div>
    
    <!-- Black overlay -->
    <div class="fixed inset-0 -z-10 bg-black/50"></div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 
                bg-white/30 backdrop-blur-md 
                shadow-md border-b border-white/20">

        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

            <h1 class="text-xl font-semibold text-white">
                Author • Nimra Tanveer
            </h1>

            <div class="text-sm text-white">
                Books Collection
            </div>

        </div>

    </nav>

    <!-- Push content below navbar -->
    <div class="pt-24"></div>

    <!-- Search Bar -->
    <div class="flex justify-center mt-2 px-4">

        <div class="relative w-full max-w-xl">

            <!-- Search Icon -->
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-800 drop-shadow-sm"
                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>

            <form>
                <!-- Input -->
                <input id="searchInput" type="text" placeholder="Search a Book" class="w-full h-12 pl-12 pr-4 rounded-full 
                       bg-white/60 backdrop-blur-md
                       border border-white/40
                       shadow-md
                       text-gray-800
                       placeholder-gray-600
                       outline-none
                       transition duration-300
                       focus:bg-white/90
                       focus:shadow-xl
                       focus:ring-2 focus:ring-brown-400
                       hover:shadow-lg">
                <button type="submit"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-yellow-900 px-4 py-2 rounded-full shadow-xl hover:text-amber-600 focus:outline-none">
                    Search
                </button>
            </form>
        </div>

    </div>
    <!-- Book List Container -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-w-6xl mx-auto mt-8 mb-8 px-4">

        <!-- Book Card -->
        <div class="book-card bg-black-700/80 backdrop-blur-md w-72  rounded-lg shadow-lg overflow-hidden shadow-white shadow-sm hover:shadow-xl hover:scale-105 transition duration-500">

            <img src="dreadful_her.png" alt="Book Cover" class="w-full h-64 object-cover">
            <div class="p-4">

                <h2 class="text-xl font-semibold text-white">Dreadfull Her</h2>

                <p class="text-white/50 mb-4 italic">A Novel-based book featuring a woman as a main lead and her revolutionary change throughout the series.</p>
                <a href="dreadful-her.html" class="mt-4 bg-yellow-900 text-white px-4 py-2 rounded-full shadow-md hover:bg-yellow-700 focus:outline-none">
                    Read More
                </a>
            </div>
        </div>

    </div>

</body>

<script>
const input = document.getElementById("searchInput");

input.addEventListener("keyup", function () {
    const value = input.value.toLowerCase();
    const cards = document.querySelectorAll(".book-card");

    cards.forEach(card => {
        const title = card.querySelector("h2").innerText.toLowerCase();

        if (title.includes(value)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>

</html>
